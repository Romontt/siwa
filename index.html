<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Americana de Doris</title>
    
    <link rel="stylesheet" href="estilos.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo-container">
    <div class="logo">La Americana de Doris</div>
  </div>

    <button class="btn-filter" onclick="filtrar('Niña')">Niña</button>

<section class="hero">

    <h1>Tesoros con Historia</h1>
    <p>Ropa americana seleccionada con amor por Doris en Guápiles.</p>
  </div>
</section>

<section id="grid-productos" class="grid">
  <p style="text-align: center; grid-column: 1/-1;">Buscando tesoros en la tienda...</p>
</section>

<footer>
  <p>© 2026 La Americana de Doris - Guápiles, Pococí, Costa Rica</p>
  <small>Hecho con amor para Doris</small>
</footer>
