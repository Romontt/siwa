<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SUA Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --verde: #0d2c24; --naranja: #d46a4e; --gris: #f1f5f9; }
        body { font-family: 'Outfit', sans-serif; background: #fcfaf7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        
        /* Card de Login */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; }
        
        /* Contenedor Panel */
        .admin-container { background: white; width: 95%; max-width: 600px; padding: 35px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); margin: 20px; }
        
        /* Formulario */
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--verde); }
        
        input[type="text"], input[type="number"], input[type="password"], select { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; 
            font-family: 'Outfit', sans-serif; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        
        input:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 0 3px rgba(13, 44, 36, 0.1); }
        
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .discount-box { 
            background: var(--gris); padding: 20px; border-radius: 15px; 
            border-left: 4px solid var(--naranja); margin-top: 10px;
        }

        button { 
            background: var(--verde); color: white; border: none; padding: 14px; 
            border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; 
            font-size: 1rem; transition: 0.3s; 
        }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .price-preview { font-size: 1.1rem; font-weight: 700; color: var(--naranja); margin-top: 10px; }
        .old-price { text-decoration: line-through; opacity: 0.5; font-size: 0.9rem; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function AdminApp() {
            const [isLogged, setIsLogged] = useState(false);
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            
            // Estado para el producto
            const [form, setForm] = useState({
                nombre: '',
                categoria: 'Bebé',
                tallas: '',
                precio: '',
                tiene_descuento: false,
                porcentaje_descuento: 0,
                imagen_url: ''
            });

            const _supabase = supabase.createClient(
                'https://hvnpkljyoocqdzwdptgt.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0'
            );

            const handleLogin = async () => {
                setLoading(true);
                const { data } = await _supabase.from('configuracion').select('valor').eq('clave', 'admin_token').single();
                if (data && data.valor === pass) setIsLogged(true);
                else alert('Palabra clave incorrecta');
                setLoading(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                
                const precioFinal = form.tiene_descuento 
                    ? form.precio - (form.precio * (form.porcentaje_descuento / 100))
                    : null;

                const { error } = await _supabase.from('productos').insert([{
                    nombre: form.nombre,
                    categoria: form.categoria,
                    tallas: form.tallas,
                    precio: parseFloat(form.precio),
                    tiene_descuento: form.tiene_descuento,
                    porcentaje_descuento: parseInt(form.porcentaje_descuento),
                    precio_oferta: precioFinal,
                    imagen_url: form.imagen_url,
                    disponible: true
                }]);

                if (error) alert("Error: " + error.message);
                else {
                    alert("¡Prenda publicada con éxito!");
                    setForm({ nombre: '', categoria: 'Bebé', tallas: '', precio: '', tiene_descuento: false, porcentaje_descuento: 0, imagen_url: '' });
                }
                setLoading(false);
            };

            if (!isLogged) {
                return (
                    <div className="login-card">
                        <h2 style={{color: 'var(--verde)', letterSpacing: '2px', marginBottom: '10px'}}>SUA ADMIN</h2>
                        <p style={{fontSize: '0.85rem', opacity: 0.6, marginBottom: '20px'}}>Acceso privado al inventario</p>
                        <input type="password" placeholder="Palabra clave" value={pass} onChange={(e)=>setPass(e.target.value)} onKeyPress={(e)=>e.key==='Enter' && handleLogin()}/>
                        <button onClick={handleLogin} disabled={loading}>{loading ? 'Verificando...' : 'Entrar'}</button>
                    </div>
                );
            }

            return (
                <div className="admin-container">
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '30px', borderBottom: '1px solid #f1f5f9', paddingBottom: '15px'}}>
                        <h2 style={{margin: 0, color: 'var(--verde)'}}>Nueva Publicación</h2>
                        <button onClick={() => setIsLogged(false)} style={{width: 'auto', padding: '8px 15px', background: '#f1f5f9', color: '#64748b', fontSize: '0.8rem'}}>Cerrar Sesión</button>
                    </div>

                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label>Título de la Publicación</label>
                            <input type="text" placeholder="Ej: Vestido Floral Primavera" required value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>Categoría</label>
                            <div className="radio-group">
                                {['Bebé', 'Niño', 'Niña'].map(c => (
                                    <label key={c} className="radio-item">
                                        <input type="radio" name="cat" checked={form.categoria === c} onChange={() => setForm({...form, categoria: c})} />
                                        {c}
                                    </label>
                                ))}
                            </div>
                        </div>

                        <div className="form-group">
                            <label>Tallas Disponibles</label>
                            <input type="text" placeholder="Ej: 3-6m, 12m, 2T (separadas por coma)" value={form.tallas} onChange={e => setForm({...form, tallas: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>Precio Original (₡)</label>
                            <input type="number" placeholder="Ej: 15000" required value={form.precio} onChange={e => setForm({...form, precio: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>¿Aplicar Descuento?</label>
                            <select value={form.tiene_descuento} onChange={e => setForm({...form, tiene_descuento: e.target.value === 'true'})}>
                                <option value="false">No</option>
                                <option value="true">Sí, aplicar oferta</option>
                            </select>
                        </div>

                        {form.tiene_descuento && (
                            <div className="discount-box">
                                <label>Porcentaje de Descuento (%)</label>
                                <input type="number" placeholder="Ej: 20" value={form.porcentaje_descuento} onChange={e => setForm({...form, porcentaje_descuento: e.target.value})} />
                                {form.precio > 0 && (
                                    <div className="price-preview">
                                        <span className="old-price">₡{parseInt(form.precio).toLocaleString()}</span>
                                        <span>Nuevo Precio: ₡{(form.precio - (form.precio * (form.porcentaje_descuento / 100))).toLocaleString()}</span>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="form-group" style={{marginTop: '15px'}}>
                            <label>URL de la Imagen</label>
                            <input type="text" placeholder="Pegue el link de la foto aquí" required value={form.imagen_url} onChange={e => setForm({...form, imagen_url: e.target.value})} />
                        </div>

                        <button type="submit" disabled={loading} style={{marginTop: '10px'}}>
                            {loading ? 'Guardando...' : 'Publicar en la Tienda'}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
