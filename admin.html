<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | SUA Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --verde: #0d2c24; --naranja: #d46a4e; --gris: #f1f5f9; }
        body { font-family: 'Outfit', sans-serif; background: #fcfaf7; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; }
        .admin-container { background: white; width: 95%; max-width: 600px; padding: 35px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); margin: 20px; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.9rem; color: var(--verde); }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 1rem; box-sizing: border-box; }
        .radio-group { display: flex; gap: 15px; }
        .discount-box { background: var(--gris); padding: 20px; border-radius: 15px; border-left: 4px solid var(--naranja); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: var(--verde); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.3s; }
        .btn-preview { background: #64748b; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #cbd5e1; }
        .preview-img-container { margin-top: 15px; text-align: center; border-radius: 15px; overflow: hidden; background: #eee; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .preview-img { max-width: 100%; max-height: 300px; object-fit: cover; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function AdminApp() {
            const [isLogged, setIsLogged] = useState(false);
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [imageFile, setImageFile] = useState(null);
            
            const [form, setForm] = useState({
                nombre: '', categoria: 'Bebé', tallas: '', precio: '',
                tiene_descuento: false, porcentaje_descuento: 0
            });

            const _supabase = supabase.createClient(
                'https://hvnpkljyoocqdzwdptgt.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2bnBrbGp5b29jcWR6d2RwdGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTAxMTQsImV4cCI6MjA5MjE4NjExNH0.-pq3iVzqJsJCyGNXkFPlHSIQeBTrr7i7ptsY6FYjJZ0'
            );

            const handleLogin = async () => {
                setLoading(true);
                const { data } = await _supabase.from('configuracion').select('valor').eq('clave', 'admin_token').single();
                if (data && data.valor === pass) setIsLogged(true);
                else alert('Palabra clave incorrecta');
                setLoading(false);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setImageFile(file);
                    setPreviewUrl(URL.createObjectURL(file));
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!imageFile) return alert("Por favor selecciona una foto");
                setLoading(true);

                try {
                    // 1. Subir imagen al Bucket
                    const fileName = `${Date.now()}_${imageFile.name}`;
                    const { data: uploadData, error: uploadError } = await _supabase.storage
                        .from('productos')
                        .upload(fileName, imageFile);

                    if (uploadError) throw uploadError;

                    // 2. Obtener URL pública
                    const { data: { publicUrl } } = _supabase.storage.from('productos').getPublicUrl(fileName);

                    // 3. Guardar en Base de Datos
                    const precioFinal = form.tiene_descuento 
                        ? form.precio - (form.precio * (form.porcentaje_descuento / 100))
                        : null;

                    const { error: dbError } = await _supabase.from('productos').insert([{
                        ...form,
                        precio: parseFloat(form.precio),
                        porcentaje_descuento: parseInt(form.porcentaje_descuento),
                        precio_oferta: precioFinal,
                        imagen_url: publicUrl,
                        disponible: true
                    }]);

                    if (dbError) throw dbError;

                    alert("¡Prenda publicada con éxito!");
                    setForm({ nombre: '', categoria: 'Bebé', tallas: '', precio: '', tiene_descuento: false, porcentaje_descuento: 0 });
                    setPreviewUrl(null);
                    setImageFile(null);
                } catch (err) {
                    alert("Error: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (!isLogged) {
                return (
                    <div className="login-card">
                        <h2>SUA ADMIN</h2>
                        <input type="password" placeholder="Palabra clave" onChange={(e)=>setPass(e.target.value)} onKeyPress={(e)=>e.key==='Enter' && handleLogin()}/>
                        <button onClick={handleLogin} disabled={loading}>{loading ? 'Verificando...' : 'Entrar'}</button>
                    </div>
                );
            }

            return (
                <div className="admin-container">
                    <h2 style={{color: 'var(--verde)', textAlign: 'center'}}>Nueva Prenda</h2>
                    <form onSubmit={handleSubmit}>
                        <div className="form-group">
                            <label>Título</label>
                            <input type="text" required value={form.nombre} onChange={e => setForm({...form, nombre: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>Categoría</label>
                            <div className="radio-group">
                                {['Bebé', 'Niño', 'Niña'].map(c => (
                                    <label key={c}><input type="radio" checked={form.categoria === c} onChange={() => setForm({...form, categoria: c})} /> {c}</label>
                                ))}
                            </div>
                        </div>

                        <div className="form-group">
                            <label>Tallas (ej: 3m, 6m, 2T)</label>
                            <input type="text" value={form.tallas} onChange={e => setForm({...form, tallas: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>Precio (₡)</label>
                            <input type="number" required value={form.precio} onChange={e => setForm({...form, precio: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label>¿Descuento?</label>
                            <select onChange={e => setForm({...form, tiene_descuento: e.target.value === 'true'})}>
                                <option value="false">No</option>
                                <option value="true">Sí</option>
                            </select>
                        </div>

                        {form.tiene_descuento && (
                            <div className="discount-box">
                                <label>Porcentaje (%)</label>
                                <input type="number" onChange={e => setForm({...form, porcentaje_descuento: e.target.value})} />
                            </div>
                        )}

                        <div className="form-group">
                            <label>Seleccionar Foto</label>
                            <input type="file" accept="image/*" onChange={handleFileChange} />
                        </div>

                        {previewUrl && (
                            <div className="preview-img-container">
                                <img src={previewUrl} className="preview-img" alt="Vista previa" />
                            </div>
                        )}

                        <div className="btn-group">
                            <button type="button" className="btn-preview" onClick={() => !previewUrl && alert("Sube una foto primero")}>
                                Vista Previa
                            </button>
                            <button type="submit" disabled={loading}>
                                {loading ? 'Subiendo...' : 'Publicar'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
